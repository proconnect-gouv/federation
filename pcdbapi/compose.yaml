services:
  pcdbapi:
    build:
      context: .
    environment:
      - MONGODB_URL=mongodb://mongo:27017/core-fca-low?authSource=core-fca-low&directConnection=true
      - MONGODB_USERNAME=fc
      - MONGODB_PASSWORD=pass
      - API_SECRET=pcdb-api-secret-key
      - CLIENT_SECRET_CIPHER_PASS=test-pcdbapi-secret-cipher-passs
      - CANT_RUN_TESTS=1
    ports:
      - '8000:8000'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - data
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/livez\")"']
      interval: 10s
      timeout: 5s
      retries: 5
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  pcdbapi-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    pull_policy: build
    profiles: ['test']
    volumes:
      - .:/app
    environment:
      - MONGODB_URL=mongodb://mongo:27017/core-fca-low?authSource=core-fca-low&directConnection=true
      - MONGODB_USERNAME=fc
      - MONGODB_PASSWORD=pass
      - CLIENT_SECRET_CIPHER_PASS=test-pcdbapi-secret-cipher-passs
      - API_SECRET=pcdb-api-secret-key
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - data

  mongo:
    extends:
      file: ../docker/compose/shared/compose.yaml
      service: mongo

networks:
  data:
