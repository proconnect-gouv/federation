name: 💚 CI Tests

on:
  push:

permissions:
  contents: read

jobs:
  test_static_back:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./back
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          cache-dependency-path: ./back/yarn.lock
          node-version-file: ./back/package.json

      - name: Install dependencies
        run: yarn install --ignore-engines --frozen-lockfile --no-progress

      - name: Check doc
        run: |
          yarn doc
          git --no-pager diff --exit-code || (echo "💥 You forgot documentation 💥" && exit 1)

      - name: Check code style
        run: |
          yarn lint
          yarn prettier

      - name: Check transpilation
        run: yarn tsc --noEmit

  test_static_quality:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./quality
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          cache-dependency-path: ./back/yarn.lock
          node-version-file: ./back/package.json

      - name: Install quality dependencies
        run: yarn install --frozen-lockfile --no-progress

      - name: Check code style
        run: yarn lint

  test_unit_back:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./back
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          cache-dependency-path: ./back/yarn.lock
          node-version-file: ./back/package.json

      - name: Install dependencies
        run: yarn install --ignore-engines --frozen-lockfile --no-progress

      - name: Test code coverage
        run: yarn test --coverage

  test_snapshot:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./quality
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          cache-dependency-path: ./quality/yarn.lock
          node-version-file: ./quality/package.json

      - name: Set up dockerx
        uses: docker/setup-buildx-action@v4

      # Workaround for https://github.com/docker/compose/issues/12892
      - name: Upgrade Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Set FEDERATION_DIR environment variable
        working-directory: ./
        run: echo "FEDERATION_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Connect to docker registry
        working-directory: ./docker
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Start docker stack
        working-directory: ./docker
        run: |
          set -x
          ./docker-stack prune-ci
          ./docker-stack up small

      - name: Install quality dependencies
        run: yarn install --frozen-lockfile --no-progress

      - name: Test snapshots
        run: |
          yarn test:low:snapshot -c video=false
          yarn report

      - name: Create artifacts-logs directory
        if: failure()
        run: mkdir -p artifacts-logs

      - name: Collect Docker logs
        if: failure()
        working-directory: ./docker
        run: |
          ./docker-stack compose logs --no-color > ../quality/artifacts-logs/docker-compose.log 2>&1
          docker ps -a > ../quality/artifacts-logs/docker-ps.log 2>&1

      - name: Upload Cypress Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-snapshots-artifacts
          path: |
            quality/cypress/screenshots
            quality/cypress/snapshots
            quality/cypress/logs
            quality/cypress/reports/cucumber/html-report
            quality/artifacts-logs

  test_e2e:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./quality
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: yarn
          cache-dependency-path: ./quality/yarn.lock
          node-version-file: ./quality/package.json

      - name: Set up dockerx
        uses: docker/setup-buildx-action@v4

      # Workaround for https://github.com/docker/compose/issues/12892
      - name: Upgrade Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Set FEDERATION_DIR environment variable
        working-directory: ./
        run: echo "FEDERATION_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Connect to docker registry
        working-directory: ./docker
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Start docker stack
        working-directory: ./docker
        run: |
          set -x
          ./docker-stack prune-ci
          ./docker-stack up "${{ matrix.stack }}"

      - name: Install quality dependencies
        run: yarn install --frozen-lockfile --no-progress

      - name: Execute e2e tests
        run: |
          yarn test:low:chrome-desktop -c video=false --env TAGS="${{ matrix.tags }}"
          yarn report

      - name: Create artifacts-logs directory
        if: failure()
        run: mkdir -p artifacts-logs

      - name: Collect Docker logs
        if: failure()
        working-directory: ./docker
        run: |
          ./docker-stack compose logs --no-color > ../quality/artifacts-logs/docker-compose.log 2>&1
          docker ps -a > ../quality/artifacts-logs/docker-ps.log 2>&1

      - name: Upload Cypress Artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-${{ matrix.stack }}-artifacts
          path: |
            quality/cypress/screenshots
            quality/cypress/logs
            quality/cypress/reports/cucumber/html-report
            quality/artifacts-logs
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: medium
            tags: 'not @hybridge and not @ignore'
          - stack: hybridge
            tags: '@hybridge'
