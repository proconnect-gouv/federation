services:
  ####################
  # SP Mocks
  ####################

  fsa1-low:
    hostname: fsa1-low
    build:
      context: '../../../back'
      target: dev
    user: ${CURRENT_UID}
    working_dir: /var/www/app
    depends_on:
      redis-pwd:
        condition: service_healthy
    volumes:
      - '../../../back/apps:/var/www/app/apps:ro'
      - '../../../back/instances:/var/www/app/instances:ro'
      - '../../../back/libs:/var/www/app/libs:ro'
      - '../../volumes/app:/opt/scripts'
      - '../../volumes/log/:/var/log/app'
      - '../../volumes/.home:/home'
      - '../../volumes/ssl:/etc/ssl/docker_host:ro'
    tmpfs:
      - /var/www/app/dist:mode=777
    env_file:
      - '../shared/.env/base-app.env'
      - '../fca-low/.env/fsa1-low.env'
    tty: true
    networks:
      - public
      - data
    init: true

