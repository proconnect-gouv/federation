services:
  core-fca-rie:
    hostname: core-fca-rie
    build:
      context: '../../../back'
      target: dev
    user: ${CURRENT_UID}
    depends_on:
      mongo-fca-low:
        condition: service_healthy
      redis-pwd:
        condition: service_healthy
    volumes:
      - '../../../back/apps:/var/www/app/apps:ro'
      - '../../../back/instances:/var/www/app/instances:ro'
      - '../../../back/libs:/var/www/app/libs:ro'
      - '../../volumes/app:/opt/scripts'
      - '../../volumes/log:/var/log/app'
      - '../../volumes/.home:/home'
      - '../../volumes/ssl:/etc/ssl/docker_host:ro'
    tmpfs:
      - /var/www/app/dist:mode=777
    env_file:
      - '../shared/.env/base-app.env'
      - '../fca-low/.env/core-fca-rie.env'
    tty: true
    networks:
      - fc
      - data
      - public
    init: true
