services:
  ####################
  ##
  ##   RIE network
  ##
  ####################
  hybridge-rie:
    hostname: hybridge-rie
    build:
      context: '../../../back'
      target: dev
    user: ${CURRENT_UID}
    depends_on:
      - broker
    volumes:
      - '../../../back/apps:/var/www/app/apps:ro'
      - '../../../back/libs:/var/www/app/libs:ro'
      - '../../volumes/app:/opt/scripts'
      - '../../volumes/log/:/var/log/app'
      - '../../volumes/.home:/home'
      - ../../volumes/ssl:/etc/ssl/docker_host:ro
    tmpfs:
      - /var/www/app/dist:mode=777
    env_file:
      - '../shared/.env/base-app.env'
      - '../fca-low/.env/hybridge-rie.env'
    tty: true
    networks:
      - rie
    init: true
    command: 'yarn start:dev csmr-rie'

  hybridge-rie-cluster:
    hostname: hybridge-rie
    build:
      context: '../../../back'
      target: dev
    user: ${CURRENT_UID}
    depends_on:
      - broker-1
      - broker-2
      - broker-3
    volumes:
      - '../../../back/apps:/var/www/app/apps:ro'
      - '../../../back/libs:/var/www/app/libs:ro'
      - '../../volumes/app:/opt/scripts'
      - '../../volumes/log/:/var/log/app'
      - '../../volumes/.home:/home'
      - ../../volumes/ssl:/etc/ssl/docker_host:ro
    tmpfs:
      - /var/www/app/dist:mode=777
    env_file:
      - '../shared/.env/base-app.env'
      - '../fca-low/.env/hybridge-rie-cluster.env'
    tty: true
    networks:
      - rie
      - data
    init: true
    command: 'yarn start:dev csmr-rie'
