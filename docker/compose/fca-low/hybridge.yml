services:
  ####################
  ##
  ##   PUBLIC network
  ##
  ####################

  rp-bridge-proxy:
    image: nginx:1.14.2
    volumes:
      - ../../volumes/nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../volumes/nginx-proxy/includes:/etc/nginx/includes:ro
      - ../../volumes/rp-bridge-proxy/:/etc/nginx/conf.d:ro
      - ../../volumes/ssl:/etc/nginx/docker_host:ro
    networks:
      public:
        ipv4_address: 172.16.1.254
    depends_on:
      - bridge-proxy-rie

  bridge-proxy-rie:
    hostname: bridge-proxy-rie
    build:
      context: '../../../back'
      target: dev
    user: ${CURRENT_UID}
    working_dir: /var/www/app
    volumes:
      - '../../../back/apps:/var/www/app/apps:ro'
      - '../../../back/instances:/var/www/app/instances:ro'
      - '../../../back/libs:/var/www/app/libs:ro'
      - '../../volumes/app:/opt/scripts'
      - '../../volumes/log:/var/log/app'
      - '../../volumes/.home:/home'
      - '../../volumes/ssl:/etc/ssl/docker_host:ro'
    tmpfs:
      - /var/www/app/dist:mode=777
    env_file:
      - '../shared/.env/base-app.env'
      - '../fca-low/.env/bridge-proxy-rie.env'
    tty: true
    networks:
      - public
      - data
    init: true

  ####################
  ##
  ##   RIE network
  ##
  ####################
  csmr-rie:
    hostname: csmr-rie
    build:
      context: '../../../back'
      target: dev
    user: ${CURRENT_UID}
    working_dir: /var/www/app
    depends_on:
      - broker
    volumes:
      - '../../../back/apps:/var/www/app/apps:ro'
      - '../../../back/instances:/var/www/app/instances:ro'
      - '../../../back/libs:/var/www/app/libs:ro'
      - '../../volumes/app:/opt/scripts'
      - '../../volumes/log/:/var/log/app'
      - '../../volumes/.home:/home'
      - ../../volumes/ssl:/etc/ssl/docker_host:ro
    tmpfs:
      - /var/www/app/dist:mode=777
    env_file:
      - '../shared/.env/base-app.env'
      - '../fca-low/.env/csmr-rie.env'
    tty: true
    networks:
      - rie
    init: true

  fia-llng-low:
    build:
      context: '../..'
      dockerfile: 'builds/lemonldap/Dockerfile'
    volumes:
      - '../../volumes/llng/scripts/:/scripts:ro'
      - '../../volumes/llng/llng-conf.json:/llng-conf.json:ro'
    env_file:
      - '../fca-low/.env/fia-llng-low.env'
    networks:
      - rie

  fia-rie-low:
    hostname: fia-rie-low
    build:
      context: '../../../back'
      target: dev
    user: ${CURRENT_UID}
    working_dir: /var/www/app
    depends_on:
      redis-pwd:
        condition: service_healthy
    volumes:
      - '../../../back/apps:/var/www/app/apps:ro'
      - '../../../back/instances:/var/www/app/instances:ro'
      - '../../../back/libs:/var/www/app/libs:ro'
      - '../../volumes/app:/opt/scripts'
      - '../../volumes/fca-low/mocks/idp/databases:/var/databases'
      - '../../volumes/log/:/var/log/app'
      - '../../volumes/.home:/home'
      - '../../volumes/ssl:/etc/ssl/docker_host:ro'
    tmpfs:
      - /var/www/app/dist:mode=777
    env_file:
      - '../shared/.env/base-app.env'
      - '../fca-low/.env/fia-rie-low.env'
    tty: true
    networks:
      - rie
    init: true
