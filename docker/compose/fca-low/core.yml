services:
  core-fca-low:
    hostname: core-fca-low
    build:
      context: '../../../back'
      target: dev
    user: ${CURRENT_UID}
    working_dir: /var/www/app
    depends_on:
      mongo-fca-low:
        condition: service_healthy
      redis-pwd:
        condition: service_healthy
    volumes:
      - '../../../back:/var/www/app'
      - '/var/www/app/node_modules'
      - '../../volumes/app:/opt/scripts'
      - '../../volumes/log:/var/log/app'
      - '../../volumes/.home:/home'
      - '../../volumes/ssl:/etc/ssl/docker_host:ro'
    env_file:
      - '../shared/.env/base-app.env'
      - '../fca-low/.env/core-fca-low.env'
    tty: true
    networks:
      - fc
      - public
      - data
    init: true

  core-fca-low-squid:
    extends: core-fca-low
    hostname: core-fca-low-squid
    depends_on:
      mongo-fca-low:
        condition: service_healthy
      redis-pwd:
        condition: service_healthy
      squid:
        condition: service_started
    environment:
      # Proxy Configuration for Hybridge
      GLOBAL_AGENT_HTTP_PROXY: http://squid:3128
      GLOBAL_AGENT_HTTPS_PROXY: http://squid:3128
